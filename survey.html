<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ONESELF アンケート</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#f1f5f9; color:#0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .card{background:#fff; width:100%; max-width:440px; border-radius:16px; padding:26px 22px; box-shadow:0 6px 24px rgba(0,0,0,.08);}
  h1{font-size:18px; margin-bottom:6px;}
  p.lead{font-size:13px; color:#64748b; margin-bottom:18px; line-height:1.6;}
  .label{font-size:14px; font-weight:600; margin:14px 0 8px;}
  .stars{display:flex; gap:8px; justify-content:center; margin:8px 0 4px;}
  .star{font-size:38px; cursor:pointer; filter:grayscale(1); opacity:.4; transition:.1s; user-select:none;}
  .star.on{filter:none; opacity:1; transform:scale(1.05);}
  .ratingText{text-align:center; font-size:13px; color:#0ea5e9; min-height:18px; font-weight:600;}
  textarea{width:100%; min-height:90px; padding:11px; border:1px solid #e5e7eb; border-radius:10px; font-size:15px; font-family:inherit; resize:vertical; margin-top:4px;}
  button{width:100%; margin-top:18px; padding:14px; background:#0ea5e9; color:#fff; border:none; border-radius:12px; font-weight:700; font-size:16px; cursor:pointer;}
  button:disabled{background:#94a3b8;}
  .done{text-align:center; padding:20px 0;}
  .done .big{font-size:44px;}
  .err{color:#b91c1c; font-size:13px; margin-top:10px; text-align:center;}
</style>
</head>
<body>
<div class="card" id="card">
  <h1>ご対応はいかがでしたか？</h1>
  <p class="lead">サービス向上のため、ご感想をお聞かせください（30秒で完了します）。</p>

  <div class="label">満足度</div>
  <div class="stars" id="stars">
    <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span><span class="star" data-v="3">★</span><span class="star" data-v="4">★</span><span class="star" data-v="5">★</span>
  </div>
  <div class="ratingText" id="ratingText"></div>

  <div class="label">ご意見・ご要望（任意）</div>
  <textarea id="comment" placeholder="お気づきの点があればご記入ください（任意）"></textarea>

  <button id="submit" onclick="submit_()">送信する</button>
  <div class="err" id="err"></div>
</div>

<script>
var WORKER_BASE="https://oneselfchatbot.0618-fmp.workers.dev";
var params=new URLSearchParams(location.search);
var C=params.get("c")||"", T=params.get("t")||"";
var rating=0;
var labels={1:"とても不満",2:"不満",3:"普通",4:"満足",5:"とても満足"};

var stars=document.querySelectorAll(".star");
Array.prototype.forEach.call(stars, function(s){
  s.onclick=function(){
    rating=parseInt(s.getAttribute("data-v"),10);
    Array.prototype.forEach.call(stars, function(x){ x.classList.toggle("on", parseInt(x.getAttribute("data-v"),10)<=rating); });
    document.getElementById("ratingText").textContent=labels[rating]||"";
  };
});

function submit_(){
  if (!C || !T){ document.getElementById("err").textContent="リンクが正しくありません。"; return; }
  if (!rating){ document.getElementById("err").textContent="満足度を選択してください。"; return; }
  var btn=document.getElementById("submit"); btn.disabled=true; btn.textContent="送信中…";
  fetch(WORKER_BASE+"/v2/survey", {
    method:"POST", headers:{"content-type":"application/json"},
    body: JSON.stringify({ c:C, t:T, rating:rating, comment:document.getElementById("comment").value })
  }).then(function(r){ return r.json(); }).then(function(r){
    if (r && r.ok){
      document.getElementById("card").innerHTML='<div class="done"><div class="big">🙏</div><h1 style="margin-top:10px;">ご協力ありがとうございました</h1><p class="lead" style="margin-top:8px;">いただいたご意見を今後のサービス向上に活かしてまいります。</p></div>';
    } else { btn.disabled=false; btn.textContent="送信する"; document.getElementById("err").textContent="送信に失敗しました（リンクの有効期限切れの可能性）。"; }
  }).catch(function(){ btn.disabled=false; btn.textContent="送信する"; document.getElementById("err").textContent="通信エラーが発生しました。"; });
}
</script>
</body>
</html>
