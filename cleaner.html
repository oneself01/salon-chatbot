<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>ONESELF 清掃業務サポート</title>
<style>
  :root{ --brand:#0d9488; --brand-d:#0f766e; --grad:linear-gradient(135deg,#0f766e 0%,#0d9488 55%,#2dd4bf 100%); --ink:#0f172a; --sub:#64748b; --line:#e9eef3; --bg:#f4f7fb; --shadow:0 4px 16px rgba(13,148,136,.07); --shadow-lg:0 10px 30px rgba(13,148,136,.14); --r:14px; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:#fff; display:flex; flex-direction:column; height:100dvh;}
  button{font-family:inherit;}
  #loading{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--sub);}
  .spinner{width:34px; height:34px; border:3px solid #e2e8f0; border-top-color:var(--brand); border-radius:50%; animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  header{padding:14px 16px; background:var(--grad); color:#fff; display:flex; align-items:center; gap:10px; flex-shrink:0; box-shadow:0 3px 14px rgba(13,148,136,.28); z-index:5;}
  header .ttl{font-weight:700; font-size:15px;}
  header .st{font-size:11px; opacity:.9; margin-left:auto;}
  header .back{background:rgba(255,255,255,.2); border:none; color:#fff; border-radius:8px; padding:5px 10px; font-size:13px; cursor:pointer;}
  #home{display:none; flex:1; flex-direction:column; overflow:hidden;}
  #options{flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:13px; background:var(--bg); scroll-behavior:smooth;}
  .opt{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px; background:#fff; border:1px solid var(--line); border-radius:var(--r); font-size:15px; font-weight:500; text-align:left; cursor:pointer; box-shadow:var(--shadow); -webkit-tap-highlight-color:transparent; transition:transform .3s cubic-bezier(.16,1,.3,1), background .2s;}
  .opt:active{transform:scale(.97); background:#f8fafc; transition-duration:.06s;}
  .opt .arw{color:var(--brand); flex-shrink:0; width:24px; height:24px; display:flex; align-items:center; justify-content:center; background:#ccfbf1; border-radius:50%; font-size:15px; font-weight:700;}
  .answer{background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:17px; font-size:15px; line-height:1.7; white-space:pre-wrap; box-shadow:var(--shadow);}
  .askBtn{width:100%; padding:15px; background:var(--grad); color:#fff; border:none; border-radius:var(--r); font-weight:700; font-size:15px; cursor:pointer; box-shadow:0 6px 16px rgba(13,148,136,.26);}
  .askBtn.secondary{background:#eef2f7; color:#475569; box-shadow:none;}
  .fl{display:block; font-size:13px; font-weight:600; margin:10px 0 4px; color:#374151;}
  .fi{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:16px; font-family:inherit;}
  #chat{display:none; flex:1; flex-direction:column; overflow:hidden;}
  #msgs{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; background:var(--bg);}
  .row{display:flex; flex-direction:column; max-width:82%;}
  .row.customer{align-self:flex-end; align-items:flex-end;}
  .row.staff{align-self:flex-start; align-items:flex-start;}
  .row.system{align-self:center; align-items:center; max-width:92%;}
  .bubble{padding:11px 15px; border-radius:18px; font-size:15px; white-space:pre-wrap; word-break:break-word; line-height:1.55; box-shadow:0 1px 3px rgba(15,23,42,.06);}
  .row.customer .bubble{background:var(--grad); color:#fff; border-bottom-right-radius:6px;}
  .row.staff .bubble{background:#fff; color:var(--ink); border:1px solid var(--line); border-bottom-left-radius:6px;}
  .row.system .bubble{background:#eef2f7; color:#64748b; font-size:13px; border-radius:10px;}
  #typing{font-size:12px; color:#94a3b8; padding:0 16px 4px; min-height:18px; background:var(--bg);}
  #composer{display:flex; gap:8px; padding:10px; border-top:1px solid var(--line); background:#fff; align-items:flex-end; padding-bottom:calc(10px + env(safe-area-inset-bottom));}
  #composer textarea{flex:1; resize:none; height:52px; max-height:40vh; padding:12px 14px; border:1px solid var(--line); border-radius:18px; font-size:16px; font-family:inherit; line-height:1.5;}
  #composer button{width:46px; height:46px; border:none; border-radius:50%; background:var(--grad); color:#fff; font-size:18px; cursor:pointer; flex-shrink:0;}
  #composer button:disabled{background:#cbd5e1;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  @keyframes glideIn{from{opacity:0;transform:translateX(22px);}to{opacity:1;transform:translateX(0);}}
  .answer{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both;}
  .opt{animation:glideIn .5s cubic-bezier(.16,1,.3,1) both;}
  .row.customer,.row.staff{animation:fadeUp .26s ease both;}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div style="letter-spacing:.08em;">Loading…</div></div>

<div id="home">
  <header>
    <button class="back" id="homeBack" style="visibility:hidden;" onclick="screenStart_()">← 最初へ</button>
    <span class="ttl">ONESELF 清掃業務サポート</span>
  </header>
  <div id="options"></div>
</div>

<div id="chat">
  <header>
    <button class="back" onclick="showHome_()">← 戻る</button>
    <span class="ttl">スタッフ対応</span>
    <span class="st" id="connSt" style="margin-left:auto;">接続中…</span>
  </header>
  <div id="msgs"></div>
  <div id="typing"></div>
  <div id="endBar" style="padding:4px 10px 0;"><button onclick="cleanerEnd_()" style="width:100%;padding:11px;background:#fff;border:1px solid #cbd5e1;color:#0f172a;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;">✓ 終了する</button></div>
  <div id="pendingBar" style="display:none;align-items:center;gap:8px;padding:6px 12px;background:#f8fafc;border-top:1px solid var(--line);"></div>
  <div id="composer">
    <button id="attachBtn" onclick="document.getElementById('chatFile').click()" style="width:46px;height:46px;border:1px solid var(--line);border-radius:50%;background:#fff;font-size:18px;cursor:pointer;flex-shrink:0;">📎</button>
    <input type="file" id="chatFile" accept="image/*,video/*" style="display:none;" onchange="pickMedia_(this)">
    <textarea id="input" placeholder="メッセージを入力" rows="1"></textarea>
    <button id="sendBtn" onclick="send_()">➤</button>
  </div>
</div>

<script>
var WORKER_BASE = "https://oneselfchatbot.0618-fmp.workers.dev";
var WS_BASE     = WORKER_BASE.replace(/^http/, "ws");
var workDay="today", convId=null, accessToken=null, ws=null, seen=new Set(), pendingFile=null, lastSend_=null, cleanerId="";

var sigCtx=null, sigDrawn=false;
var CONSENT_SECTIONS = [
  { t:"1．始業時刻および勤怠申告について",
    b:"当店舗は無人店舗です。原則として、指定された方法により店舗へ入室し、業務を開始した時刻を始業時刻とします。\nタイミー上で勤務時間の修正を申請する場合は、実際の入退室時刻および業務時間に基づき、正確な内容を申告してください。\n入退室記録、防犯カメラ、システム操作履歴、作業報告等と申告内容に相違がある場合は、事実関係を確認させていただきます。\n故意に勤務時間を水増しするなど、虚偽の申告が確認された場合は、修正申請を承認せず、タイミーへの報告、今後の募集への申込み制限その他の必要な対応を行います。\n悪質な虚偽申告により不正に賃金を受け取った、または受け取ろうとしたと判断される場合は、返還請求、警察・弁護士への相談その他の法的措置を検討することがあります。" },
  { t:"2．終了時刻の厳守について",
    b:"業務終了後は次のお客様が店舗を利用するため、募集に記載された終了時刻までに、清掃、写真撮影、作業報告および退室を完了してください。（通常丁寧に作業を行なっても30分程度でマニュアル内の仕事は終了します。残りの時間はその他気になる箇所やマニュアル外の清掃をお願いいたします）\n終了時刻を超えそうな場合は、自己判断で作業を延長せず、終了時刻10分前に必ず担当者へ連絡してください。\n担当者から延長の指示または承認がない限り、終了時刻を超えて新たな作業を行うことは禁止します。\nやむを得ない事情により実際に終了時刻を超えて業務を行った場合は、その理由、作業内容および実際の終了時刻を正確に報告してください。" },
  { t:"3．スタッフへの言動について",
    b:"業務上の質問や意見がある場合は、事実に基づき、冷静かつ節度ある方法で連絡してください。以下の行為は禁止します。\n・スタッフに対する暴言、侮辱、人格を否定する発言\n・大声、威圧的な口調、脅迫的な言動\n・同じ要求や連絡を必要以上に繰り返す行為\n・長時間にわたりスタッフを拘束する行為\n・正当な理由のない金銭、謝罪、特別対応等の要求\n・スタッフ個人への連絡、誹謗中傷またはSNS等への投稿\n・その他、社会通念上相当な範囲を超える行為\n上記の行為が確認された場合は、対応を終了し、タイミーへの報告、今後の募集への申込み制限、警察または弁護士への相談その他の必要な措置を行うことがあります。" },
  { t:"4．清掃品質および作業報告について",
    b:"店内の状況は、防犯カメラ、清掃前後の写真、作業報告および次に利用されるお客様からの評価等により確認します。\nお客様から低評価や清掃不備の申告があった場合は、評価のみで判断せず、写真、映像、入退室記録、作業内容その他の客観的な記録を確認します。\n清掃漏れや手順違反が確認された場合は、タイミーへの事実報告および今後の募集への申込み制限を行うことがあります。\n故意または重大な過失により、店舗設備の破損、備品の持ち出し、重大な清掃不備その他の具体的な損害が発生した場合は、事実関係および実際の損害額を確認したうえで、警察・弁護士への相談または損害賠償請求を検討することがあります。" },
  { t:"5．禁止事項",
    b:"以下の行為は禁止します。\n・勤務時間、休憩時間または作業内容の虚偽申告\n・業務を行わずに勤怠のみを記録する行為\n・指定された業務を正当な理由なく行わない行為\n・清掃前後の写真や作業報告を偽る行為\n・店舗内の備品、消耗品またはお客様の所有物を持ち出す行為\n・防犯カメラ、マニュアル外の鍵、通信機器その他の設備に無断で触れる行為\n・入室コード、店舗情報またはお客様の情報を第三者へ開示する行為\n・店内を私的に利用する行為\n・勤務中に無断で店舗を離れる行為\n・第三者を店舗へ入室させる行為\n・無断で写真、動画または音声をSNS等へ投稿する行為\n違反が確認された場合は、事実関係を確認したうえで、タイミーへの報告、今後の募集への申込み制限、損害の返還・賠償請求または法的措置を行うことがあります。" }
];
var INTRO_TEXT = "🧹 ワンセルフ清掃業務にご応募いただき、ありがとうございます！\nお手続きやご質問については、下の項目からご希望の内容をお選びください。\n\n📱清掃業務は、スマートフォンでマニュアルをご確認いただきながら、チャットでやり取りを進めていただく形となります。操作に不安がある方や、スマホ・チャットに慣れていない方は、無理せずキャンセルしていただいても大丈夫です◎\n\n業務の流れ👇\n１｜ワンセルフ予約LINEから会員登録後、業務枠を予約\n２｜マニュアルを受け取る\n３｜業務1H（マニュアルを見ながら清掃・補充 → 写真報告 → 弊社担当が写真チェックし指示 → 時間になったら退室）\n４｜退室後、修正依頼を行う";

function esc_(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function linkify_(s){ return esc_(s).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--brand);">$1</a>'); }
function ls_(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet_(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function lsDel_(k){ try{ localStorage.removeItem(k); }catch(e){} }
function v_(id){ var el=document.getElementById(id); return el?el.value:""; }
function optBtn_(label, fn){ var b=document.createElement("button"); b.className="opt"; b.innerHTML='<span>'+esc_(label)+'</span><span class="arw">›</span>'; b.onclick=fn; return b; }
function answerCard_(text){ var d=document.createElement("div"); d.className="answer"; d.textContent=text; return d; }
function btn_(label, cls, fn){ var b=document.createElement("button"); b.className=cls; b.style.marginTop="8px"; b.textContent=label; b.onclick=fn; return b; }

window.addEventListener("DOMContentLoaded", function(){
  cleanerId = ls_("cleanerId") || ("cl_"+Date.now().toString(36)+Math.random().toString(36).slice(2,8));
  lsSet_("cleanerId", cleanerId);
  document.getElementById("loading").style.display="none";
  document.getElementById("home").style.display="flex";
  screenStart_();
  var ta=document.getElementById("input");
  if (ta){
    ta.addEventListener("input", function(){ ta.style.height="52px"; ta.style.height=Math.min(ta.scrollHeight,window.innerHeight*0.4)+"px"; });
    ta.addEventListener("keydown", function(e){ if (e.key==="Enter" && !e.shiftKey && !e.isComposing){ e.preventDefault(); send_(); } });
  }
});

/* ===== フロー ===== */
function box_(){ var b=document.getElementById("options"); b.innerHTML=""; return b; }
function screenStart_(){
  showHomeView_();
  document.getElementById("homeBack").style.visibility="hidden";
  var box=box_();
  var q=document.createElement("div"); q.className="answer"; q.style.fontWeight="700"; q.textContent="お仕事はいつですか？"; box.appendChild(q);
  box.appendChild(optBtn_("本日のお仕事", function(){ workDay="today"; screenMenu_(); }));
  box.appendChild(optBtn_("翌日以降のお仕事", function(){ workDay="future"; screenMenu_(); }));
  var savedC=ls_("cl_convId"), savedT=ls_("cl_token");
  if (savedC && savedT){ box.appendChild(btn_("🗨 対応中の相談を開く","askBtn secondary",function(){ convId=savedC; accessToken=savedT; showChat_(); loadHistory_().then(openWs_); })); }
  box.scrollTop=0;
}
function screenMenu_(){
  document.getElementById("homeBack").style.visibility="visible";
  var box=box_();
  box.appendChild(answerCard_(INTRO_TEXT));
  box.appendChild(optBtn_("📘 清掃マニュアルを受け取る（初回）", function(){ screenForm_("first"); }));
  box.appendChild(optBtn_("⭐️ 2回目以降のお仕事（マニュアルをお持ちの方）", function(){ screenForm_("repeat"); }));
  box.appendChild(optBtn_("❌ お仕事をキャンセルしたい", screenCancel_));
  box.scrollTop=0;
}
function screenCancel_(){
  var box=box_();
  box.appendChild(answerCard_("キャンセルをご希望の方は、タイミーからキャンセル手続きをお願いいたします。"));
  box.appendChild(btn_("← 戻る","askBtn secondary",screenMenu_));
  box.scrollTop=0;
}
function screenForm_(mode){
  var box=box_();
  box.appendChild(answerCard_(mode==="first"
    ? "対象店舗を選び、予約情報を入力してください。合致すると、店舗マニュアルと入室コードをお渡しします。"
    : "予約情報を入力してください。合致すると、入室コードをお渡しします。"));
  var f=document.createElement("div"); f.className="answer";
  f.innerHTML='<label class="fl">対象店舗 *</label><select id="cf_store" class="fi"><option value="">読み込み中…</option></select>'
    +'<label class="fl">タイミー登録時のお名前 *</label><input id="cf_name" class="fi" type="text" value="'+esc_(ls_("cl_name")||"")+'" placeholder="例：山田 太郎">'
    +'<label class="fl">予約日 *</label><input id="cf_date" class="fi" type="date">'
    +'<label class="fl">開始時刻 *</label><input id="cf_start" class="fi" type="time">'
    +'<label class="fl">終了時刻 *</label><input id="cf_end" class="fi" type="time">';
  box.appendChild(f);
  // 勤務にあたっての確認事項＋項目ごとの同意＋署名（すべて同意しないと照合に進めない）
  var consent=document.createElement("div"); consent.className="answer";
  var secHtml='<div style="font-weight:700;margin-bottom:4px;">勤務にあたっての確認事項</div>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:8px;">各項目をご確認のうえ、すべてにチェックしてください。</div>';
  CONSENT_SECTIONS.forEach(function(s,i){
    secHtml+='<div style="border:1px solid var(--line);border-radius:8px;padding:11px;margin-bottom:8px;background:#fbfcfe;">'
      +'<div style="font-weight:700;font-size:13px;color:#0f172a;margin-bottom:4px;">'+esc_(s.t)+'</div>'
      +'<div style="font-size:12px;line-height:1.7;white-space:pre-wrap;color:#334155;">'+esc_(s.b)+'</div>'
      +'<label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;font-weight:700;color:var(--brand-d);"><input type="checkbox" class="cf_agree" style="width:18px;height:18px;"> 確認・同意しました</label>'
      +'</div>';
  });
  secHtml+='<div class="fl">署名（下の枠内に指でサインしてください）*</div>'
    +'<canvas id="cf_sig" style="width:100%;height:150px;border:1px dashed #94a3b8;border-radius:8px;background:#fff;touch-action:none;display:block;"></canvas>'
    +'<button type="button" class="askBtn secondary" style="margin-top:6px;padding:9px;" onclick="clearSig_()">署名をクリア</button>';
  consent.innerHTML=secHtml;
  box.appendChild(consent);
  var sub=btn_("同意して照合する","askBtn",function(){ submitKey_(mode); }); sub.id="cf_submit"; sub.style.marginTop="12px";
  box.appendChild(sub);
  box.appendChild(btn_("← 戻る","askBtn secondary",screenMenu_));
  box.scrollTop=0;
  loadStores_();
  setTimeout(initSig_, 60);
}
function initSig_(){
  var c=document.getElementById("cf_sig"); if(!c) return;
  var rect=c.getBoundingClientRect(); var dpr=window.devicePixelRatio||1;
  c.width=Math.max(1,Math.round(rect.width*dpr)); c.height=Math.round(150*dpr);
  sigCtx=c.getContext("2d"); sigCtx.scale(dpr,dpr);
  sigCtx.lineWidth=2.5; sigCtx.lineCap="round"; sigCtx.lineJoin="round"; sigCtx.strokeStyle="#0f172a";
  sigDrawn=false;
  var drawing=false, last=null;
  function pos(e){ var r=c.getBoundingClientRect(); var t=(e.touches&&e.touches[0])?e.touches[0]:e; return { x:t.clientX-r.left, y:t.clientY-r.top }; }
  function start(e){ drawing=true; last=pos(e); if(e.cancelable)e.preventDefault(); }
  function move(e){ if(!drawing||!sigCtx) return; var p=pos(e); sigCtx.beginPath(); sigCtx.moveTo(last.x,last.y); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); last=p; sigDrawn=true; if(e.cancelable)e.preventDefault(); }
  function end(){ drawing=false; }
  c.addEventListener("mousedown",start); c.addEventListener("mousemove",move); window.addEventListener("mouseup",end);
  c.addEventListener("touchstart",start,{passive:false}); c.addEventListener("touchmove",move,{passive:false}); c.addEventListener("touchend",end);
}
function clearSig_(){ var c=document.getElementById("cf_sig"); if(c&&sigCtx){ sigCtx.clearRect(0,0,c.width,c.height); sigDrawn=false; } }
function loadStores_(){
  fetch(WORKER_BASE+"/v2/cleaner/stores").then(function(x){return x.json();}).then(function(r){
    var sel=document.getElementById("cf_store"); if(!sel) return;
    var stores=(r&&r.stores)||[];
    if (stores.length){ sel.innerHTML='<option value="">選択してください</option>'+stores.map(function(s){return '<option value="'+esc_(s)+'">'+esc_(s)+'</option>';}).join(""); }
    else replaceStoreInput_();
  }).catch(function(){ replaceStoreInput_(); });
}
function replaceStoreInput_(){
  var sel=document.getElementById("cf_store"); if(!sel) return;
  var inp=document.createElement("input"); inp.id="cf_store"; inp.className="fi"; inp.type="text"; inp.placeholder="店舗名（予約通りに入力）";
  sel.parentNode.replaceChild(inp, sel);
}
async function submitKey_(mode){
  var store=v_("cf_store").trim(), name=v_("cf_name").trim(), date=v_("cf_date").trim(), start=v_("cf_start").trim(), end=v_("cf_end").trim();
  if (!store||!name||!date||!start||!end){ alert("すべての項目を入力してください。"); return; }
  var boxes=document.querySelectorAll(".cf_agree");
  var allChecked=boxes.length>0; for (var bi=0;bi<boxes.length;bi++){ if(!boxes[bi].checked){ allChecked=false; break; } }
  if (!allChecked){ alert("すべての確認事項にチェック（同意）してください。"); return; }
  if (!sigDrawn){ alert("署名欄に指でサインしてください。"); return; }
  var signature=""; try{ signature=document.getElementById("cf_sig").toDataURL("image/png"); }catch(e){}
  lsSet_("cl_name", name);
  var btn=document.getElementById("cf_submit"); if(btn){ btn.disabled=true; btn.textContent="照合中…"; }
  var r=await fetch(WORKER_BASE+"/v2/cleaner/key-lookup", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ store:store, date:date, start:start, end:end, name:name, agreed:true, signature:signature }) }).then(function(x){return x.json();}).catch(function(){ return null; });
  if(btn){ btn.disabled=false; btn.textContent="同意して照合する"; }
  if(!r||!r.ok){ alert("照合に失敗しました。時間をおいて再度お試しください。"); return; }
  screenKeyResult_(mode, r, { store:store, name:name, date:date, start:start, end:end });
}
function screenKeyResult_(mode, res, form){
  var box=box_();
  if (mode==="first"){
    var man=document.createElement("div"); man.className="answer";
    if (res.manual){ man.innerHTML='<div style="font-weight:700;margin-bottom:6px;">📘 清掃マニュアル</div><a href="'+esc_(res.manual)+'" target="_blank" rel="noopener" style="display:inline-block;padding:11px 18px;background:var(--brand);color:#fff;border-radius:9px;text-decoration:none;font-weight:600;">マニュアルを開く</a>'; }
    else { man.textContent="この店舗のマニュアルはまだ登録されていません。担当者にお問い合わせください。"; }
    box.appendChild(man);
  }
  if (res.found){
    var k=document.createElement("div"); k.className="answer"; k.style.textAlign="center";
    k.innerHTML='<div style="font-size:13px;color:#64748b;">🔑 入室コード</div>'
      +'<div style="font-size:34px;font-weight:800;letter-spacing:4px;color:var(--brand);margin:4px 0;">'+esc_(res.code)+'</div>'
      +'<div style="font-size:12px;color:#64748b;">'+esc_(form.store)+' / '+esc_(form.date)+' '+esc_(form.start)+'〜'+esc_(form.end)+'</div>';
    box.appendChild(k);
    box.appendChild(btn_("📄 清掃報告を行う","askBtn",function(){ startCleanerChat_("report", form); }));
    box.appendChild(btn_("💬 チャットで問い合わせる","askBtn secondary",function(){ tryInquiry_(form); }));
  } else {
    var nf=document.createElement("div"); nf.className="answer"; nf.style.borderColor="#fecaca"; nf.style.background="#fef2f2";
    nf.textContent="予約情報が見つかりませんでした。店舗名・予約日・開始/終了時刻が予約通りかご確認ください。";
    box.appendChild(nf);
    box.appendChild(btn_("← 入力に戻る","askBtn secondary",function(){ screenForm_(mode); }));
    box.appendChild(btn_("💬 チャットで問い合わせる","askBtn",function(){ tryInquiry_(form); }));
  }
  box.appendChild(btn_("🏠 最初に戻る","askBtn secondary",screenStart_));
  box.scrollTop=0;
}
function inquiryOpen_(){
  var h=new Date().getHours();
  if (workDay==="future") return (h>=8 && h<18);
  return (h<23); // 本日は23時まで
}
function tryInquiry_(form){
  if (!inquiryOpen_()){ screenAbsent_(); return; }
  startCleanerChat_("inquiry", form||{ store:"", name:ls_("cl_name")||"清掃委託者", date:"", start:"", end:"" });
}
function screenAbsent_(){
  var box=box_();
  box.appendChild(answerCard_("只今のお時間はスタッフが不在となります。\n翌日の8:00〜18:00の間にお問い合わせください。"));
  box.appendChild(btn_("← 戻る","askBtn secondary",screenMenu_));
  box.scrollTop=0;
}
async function startCleanerChat_(kind, form){
  var head = (kind==="report" ? "【清掃報告】" : "【問い合わせ】");
  var sit = head+" "+(form.store||"")+" "+(form.date||"")+" "+(form.start||"")+(form.end?("〜"+form.end):"");
  var r=await fetch(WORKER_BASE+"/v2/cleaner/start", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ name:(form.name||"清掃委託者"), store:(form.store||""), situation:sit, category:(kind==="report"?"清掃報告":"問い合わせ"), cleanerId:cleanerId }) }).then(function(x){return x.json();}).catch(function(){ return null; });
  if(!r||!r.ok){ alert("接続に失敗しました。時間をおいて再度お試しください。"); return; }
  convId=r.conversationId; accessToken=r.accessToken; lsSet_("cl_convId",convId); lsSet_("cl_token",accessToken);
  showChat_(); setSt_("接続中…");
  await loadHistory_();
  if (kind==="report"){ append_("system","清掃ありがとうございます！マニュアル記載の報告写真をお送りください。\n確認後、清掃の直し等の指示をさせていただきますので、退室せずお待ちください。",Date.now()); scrollBottom_(); }
  openWs_();
}

/* ===== チャット ===== */
function showHomeView_(){ document.getElementById("chat").style.display="none"; document.getElementById("home").style.display="flex"; }
function showHome_(){ showHomeView_(); screenStart_(); }
function showChat_(){ document.getElementById("home").style.display="none"; document.getElementById("chat").style.display="flex"; }
function setSt_(t){ var e=document.getElementById("connSt"); if(e) e.textContent=t; }
async function loadHistory_(){
  try{
    var url=WORKER_BASE+"/v2/messages?role=customer&aud=cleaner&c="+encodeURIComponent(convId)+"&token="+encodeURIComponent(accessToken);
    var r=await fetch(url).then(function(x){return x.json();});
    document.getElementById("msgs").innerHTML="";
    if (r && r.ok && Array.isArray(r.messages) && r.messages.length){
      r.messages.forEach(function(m){ seen.add((m.created_at||"")+"|"+(m.sender_type||"")+"|"+(m.body||"")); append_(m.sender_type,m.body,m.created_at,m.attachments); });
    } else { append_("system","ご用件を入力してください。担当者が順次対応します。",Date.now()); }
    scrollBottom_();
  }catch(e){}
}
function openWs_(){
  if (ws){ try{ws.close();}catch(e){} }
  var url=WS_BASE+"/v2/ws?role=customer&aud=cleaner&c="+encodeURIComponent(convId)+"&token="+encodeURIComponent(accessToken);
  ws=new WebSocket(url);
  ws.onopen=function(){ setSt_("● 接続中"); var ta=document.getElementById("input"); if(ta) ta.disabled=false; var sb=document.getElementById("sendBtn"); if(sb) sb.disabled=false; };
  ws.onclose=function(){ setSt_("再接続待ち"); setTimeout(function(){ if (convId && document.getElementById("chat").style.display!=="none"){ loadHistory_().then(openWs_); } }, 3000); };
  ws.onmessage=function(ev){
    var d; try{ d=JSON.parse(ev.data); }catch(e){ return; }
    if (d.type==="error"){ var ta=document.getElementById("input"); if (ta && lastSend_ && lastSend_.text && !ta.value.trim()){ ta.value=lastSend_.text; } alert("メッセージを送信できませんでした。もう一度お送りください。"); return; }
    if (d.type==="ended"){ append_("system","対応が終了しました。",Date.now()); return; }
    if (d.type==="typing"){ if (d.from==="staff") showTyping_(); return; }
    if (d.type==="message"){
      var key=(d.created_at||"")+"|"+(d.sender_type||"")+"|"+(d.body||"");
      if (seen.has(key)) return; seen.add(key);
      if (d.sender_type==="staff") clearTyping_();
      append_(d.sender_type,d.body,d.created_at,d.attachments); scrollBottom_();
    }
  };
}
var typingHideT=null;
function showTyping_(){ document.getElementById("typing").textContent="担当者が入力中…"; if(typingHideT) clearTimeout(typingHideT); typingHideT=setTimeout(clearTyping_,4000); }
function clearTyping_(){ document.getElementById("typing").textContent=""; }
function append_(sender, text, ts, attachments){
  var msgs=document.getElementById("msgs");
  var row=document.createElement("div"); row.className="row "+(sender||"system");
  var bub=document.createElement("div"); bub.className="bubble";
  if (text) bub.innerHTML=linkify_(text);
  if (attachments){ var arr=attachments; if (typeof arr==="string"){ try{arr=JSON.parse(arr);}catch(e){arr=[];} }
    (arr||[]).forEach(function(a){
      if (a.type==="image"){ var img=document.createElement("img"); img.src=a.url; img.style.cssText="max-width:200px;border-radius:8px;margin-top:6px;display:block;"; bub.appendChild(img); }
      else if (a.type==="video"){ var vd=document.createElement("video"); vd.src=a.url; vd.controls=true; vd.style.cssText="max-width:220px;border-radius:8px;margin-top:6px;display:block;"; bub.appendChild(vd); }
      else { var l=document.createElement("a"); l.href=a.url; l.target="_blank"; l.rel="noopener"; l.textContent="📎 "+(a.name||"ファイル"); l.style.cssText="display:block;margin-top:6px;color:inherit;"; bub.appendChild(l); }
    });
  }
  row.appendChild(bub); msgs.appendChild(row);
}
function scrollBottom_(){ var el=document.getElementById("msgs"); el.scrollTop=el.scrollHeight; }
function pickMedia_(input){
  var f=input.files&&input.files[0]; input.value="";
  if (!f) return; if (f.size>20*1024*1024){ alert("20MBまで"); return; }
  pendingFile=f;
  var bar=document.getElementById("pendingBar"); bar.style.display="flex";
  bar.innerHTML='<span style="font-size:12px;color:#64748b;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc_(f.name)+'</span><button onclick="clearPending_()" style="border:none;background:#0f172a;color:#fff;border-radius:50%;width:20px;height:20px;cursor:pointer;">×</button>';
}
function clearPending_(){ pendingFile=null; var bar=document.getElementById("pendingBar"); bar.style.display="none"; bar.innerHTML=""; }
async function uploadFile_(file){
  try{ var r=await fetch(WORKER_BASE+"/v2/upload?aud=cleaner&name="+encodeURIComponent(file.name), { method:"POST", headers:{"content-type":file.type||"application/octet-stream"}, body:file }); return await r.json(); }
  catch(e){ return null; }
}
async function send_(){
  var ta=document.getElementById("input"); var text=ta.value.trim();
  if (!pendingFile && !text) return;
  if (!ws || ws.readyState!==1){ if (convId) openWs_(); return; }
  if (pendingFile){
    var f=pendingFile; var sb=document.getElementById("sendBtn"); if(sb) sb.disabled=true;
    var up=await uploadFile_(f); if(sb) sb.disabled=false;
    if (up && up.success){ ws.send(JSON.stringify({ type:"message", body:text, attachments:[{ url:up.fileUrl, type:up.type, name:up.name }] })); clearPending_(); ta.value=""; ta.style.height="52px"; }
    else { alert("送信に失敗しました。"); }
    return;
  }
  lastSend_={text:text};
  ws.send(JSON.stringify({ type:"message", body:text }));
  ta.value=""; ta.style.height="52px";
}
function cleanerEnd_(){
  if (!confirm("チャットを終了します。よろしいですか？")) return;
  if (ws){ try{ws.close();}catch(e){} ws=null; }
  convId=null; accessToken=null; lsDel_("cl_convId"); lsDel_("cl_token");
  showHome_();
}
</script>
</body>
