<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>ONESELF サポート</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{ --brand:#0ea5e9; --brand-d:#0284c7; --ink:#0f172a; --sub:#64748b; --line:#e5e7eb; --bg:#f8fafc; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:#fff; display:flex; flex-direction:column; height:100dvh;}
  button{font-family:inherit;}
  #loading{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--sub);}
  .spinner{width:34px; height:34px; border:3px solid #e2e8f0; border-top-color:var(--brand); border-radius:50%; animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #errBox{display:none; padding:16px; margin:16px; background:#fef2f2; border:1px solid #fecaca; color:#991b1b; border-radius:10px; font-size:14px; white-space:pre-wrap;}
  header{padding:12px 16px; background:var(--brand); color:#fff; display:flex; align-items:center; gap:10px; flex-shrink:0;}
  header .ttl{font-weight:700; font-size:15px;}
  header .st{font-size:11px; opacity:.9; margin-left:auto;}
  header .back{background:rgba(255,255,255,.2); border:none; color:#fff; border-radius:8px; padding:5px 10px; font-size:13px; cursor:pointer;}

  /* ===== ホーム（FAQツリー） ===== */
  #home{display:none; flex:1; flex-direction:column; overflow:hidden;}
  #crumb{padding:10px 16px; font-size:12px; color:var(--sub); background:var(--bg); border-bottom:1px solid var(--line); min-height:38px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  #crumb .c{cursor:pointer; color:var(--brand);}
  #options{flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; background:var(--bg);}
  .opt{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:15px 16px; background:#fff; border:1px solid var(--line); border-radius:12px; font-size:15px; text-align:left; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .opt:active{background:#f1f5f9;}
  .opt .arw{color:#cbd5e1; flex-shrink:0;}
  .answer{background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px; font-size:15px; line-height:1.6; white-space:pre-wrap;}
  .answer img{max-width:100%; height:auto; border-radius:8px; margin-top:10px;}
  .answer a.media{display:inline-block; margin-top:10px; padding:11px 18px; background:var(--brand); color:#fff; text-decoration:none; border-radius:9px; font-weight:600; font-size:14px;}
  .askBtn{width:100%; padding:14px; background:#ef4444; color:#fff; border:none; border-radius:12px; font-weight:700; font-size:15px; cursor:pointer;}
  .askBtn.secondary{background:#64748b;}
  .fl{display:block; font-size:13px; font-weight:600; margin:10px 0 4px; color:#374151;}
  .fi{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:16px; font-family:inherit;}
  textarea.fi{resize:vertical; min-height:80px;}
  .sug{margin-top:-2px;}
  .sug-item{padding:11px 12px; border:1px solid var(--line); border-top:none; background:#fff; font-size:15px; cursor:pointer;}
  .sug-item:first-child{border-top-left-radius:0;}
  .sug-item:active{background:#e0f2fe;}

  /* ===== ライブチャット ===== */
  #chat{display:none; flex:1; flex-direction:column; overflow:hidden;}
  #msgs{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; background:var(--bg);}
  .row{display:flex; flex-direction:column; max-width:82%;}
  .row.customer{align-self:flex-end; align-items:flex-end;}
  .row.staff{align-self:flex-start; align-items:flex-start;}
  .row.system{align-self:center; align-items:center; max-width:92%;}
  .bubble{padding:10px 14px; border-radius:16px; font-size:15px; white-space:pre-wrap; word-break:break-word; line-height:1.55;}
  .row.customer .bubble{background:var(--brand); color:#fff; border-bottom-right-radius:5px;}
  .row.staff .bubble{background:#fff; color:var(--ink); border:1px solid var(--line); border-bottom-left-radius:5px;}
  .row.system .bubble{background:#eef2f7; color:#64748b; font-size:13px; border-radius:10px;}
  .row .meta{font-size:11px; color:#94a3b8; margin-top:3px;}
  #typing{font-size:12px; color:#94a3b8; padding:0 16px 4px; min-height:18px; background:var(--bg);}
  #composer{display:flex; gap:8px; padding:10px; border-top:1px solid var(--line); background:#fff; align-items:flex-end; padding-bottom:calc(10px + env(safe-area-inset-bottom));}
  #composer textarea{flex:1; resize:none; height:52px; max-height:40vh; padding:12px 14px; border:1px solid var(--line); border-radius:18px; font-size:16px; font-family:inherit; line-height:1.5;}
  #composer button{width:44px; height:44px; border:none; border-radius:50%; background:var(--brand); color:#fff; font-size:18px; cursor:pointer; flex-shrink:0;}
  #composer button:disabled{background:#cbd5e1;}

  /* フォームのオーバーレイ */
  #formView{display:none; position:fixed; inset:0; background:#fff; z-index:100; flex-direction:column;}
  #formView iframe{flex:1; width:100%; border:none;}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div>読み込み中…</div></div>
<div id="errBox"></div>

<!-- ホーム（FAQツリー） -->
<div id="home">
  <header>
    <button class="back" id="homeBack" style="visibility:hidden;" onclick="goBack_()">← 戻る</button>
    <span class="ttl">ONESELF サポート</span>
  </header>
  <div id="crumb"></div>
  <div id="options"></div>
</div>

<!-- ライブチャット -->
<div id="chat">
  <header>
    <button class="back" onclick="showHome_()">← FAQ</button>
    <span class="ttl">スタッフ対応</span>
    <span class="st" id="connSt">接続中…</span>
  </header>
  <div id="msgs"></div>
  <div id="typing"></div>
  <div id="composer">
    <textarea id="input" placeholder="メッセージを入力" rows="1"></textarea>
    <button id="sendBtn" onclick="send_()">➤</button>
  </div>
</div>

<!-- フォーム -->
<div id="formView">
  <header><button class="back" onclick="closeForm_()">← 戻る</button><span class="ttl">フォーム</span></header>
  <iframe id="formFrame" allow="clipboard-write"></iframe>
</div>

<script>
/* =========================================================
 *  設定
 * ========================================================= */
var LIFF_ID     = "2010385778-OQo3c1Q3";
var WORKER_BASE = "https://oneselfchatbot.0618-fmp.workers.dev";
var WS_BASE     = WORKER_BASE.replace(/^http/, "ws");
var GAS_URL     = "https://script.google.com/macros/s/AKfycbzibjrSDBt4BJVuXgX28LmkPvfthxsNolHjgpdajhlxzro2brT8ww3VgsKc5gbhdscYsw/exec";

// 店舗リスト（将来は管理画面から差し替え予定）。n=表示名, k=読み仮名（検索用）
var STORES = [
  {n:"浜松市野",k:"はままついちの"},{n:"新潟",k:"にいがた"},{n:"袋井浅羽",k:"ふくろいあさば"},
  {n:"甲府",k:"こうふ"},{n:"つくば",k:"つくば"},{n:"宇都宮",k:"うつのみや"},{n:"三島",k:"みしま"},
  {n:"富士",k:"ふじ"},{n:"沼津",k:"ぬまづ"},{n:"長野",k:"ながの"},{n:"横浜上大岡",k:"よこはまかみおおおか"},
  {n:"水戸",k:"みと"},{n:"岐阜",k:"ぎふ"},{n:"浜松佐鳴台",k:"はままつさなるだい"},{n:"平塚",k:"ひらつか"},
  {n:"岡崎",k:"おかざき"},{n:"川崎元住吉",k:"かわさきもとすみよし"},{n:"御殿場",k:"ごてんば"},
  {n:"鹿児島荒田",k:"かごしまあらた"},{n:"横浜白楽",k:"よこはまはくらく"},{n:"刈谷",k:"かりや"},
  {n:"多治見",k:"たじみ"},{n:"豊橋",k:"とよはし"},{n:"高岡",k:"たかおか"},{n:"名古屋中村",k:"なごやなかむら"},
  {n:"日立",k:"ひたち"},{n:"厚木",k:"あつぎ"},{n:"静岡駿河",k:"しずおかするが"},{n:"横須賀",k:"よこすか"},
  {n:"津",k:"つ"},{n:"福井",k:"ふくい"},{n:"奈良",k:"なら"},{n:"成田",k:"なりた"},
  {n:"豊田若林",k:"とよたわかばやし"},{n:"仙台一番町",k:"せんだいいちばんちょう"},{n:"大垣",k:"おおがき"},
  {n:"小田原",k:"おだわら"},{n:"高松",k:"たかまつ"},{n:"神戸垂水",k:"こうべたるみ"},{n:"藤沢",k:"ふじさわ"},
  {n:"岡山",k:"おかやま"},{n:"富士吉田",k:"ふじよしだ"},{n:"町田駅前",k:"まちだえきまえ"},
  {n:"静岡駅北口",k:"しずおかえききたぐち"},{n:"大船",k:"おおふな"},{n:"酒々井",k:"しすい"},{n:"千葉",k:"ちば"},
  {n:"清水",k:"しみず"},{n:"名古屋駅前",k:"なごやえきまえ"},{n:"横浜関内",k:"よこはまかんない"},
  {n:"熊本新市街",k:"くまもとしんしがい"},{n:"鹿児島天文館",k:"かごしまてんもんかん"},{n:"鈴鹿",k:"すずか"},
  {n:"小倉駅南口",k:"こくらえきみなみぐち"},{n:"名古屋野並",k:"なごやのなみ"},{n:"茅ヶ崎",k:"ちがさき"},
  {n:"熊本光の森",k:"くまもとひかりのもり"},{n:"西宮門戸厄神",k:"にしのみやもんどやくじん"},
  {n:"新宿南口",k:"しんじゅくみなみぐち"},{n:"東十条",k:"ひがしじゅうじょう"},{n:"久留米",k:"くるめ"},
  {n:"富山",k:"とやま"},{n:"春日部",k:"かすかべ"},{n:"長崎",k:"ながさき"},{n:"尾道",k:"おのみち"}
];

/* 状態 */
var idToken="", profile=null, tree=null, mediaData={}, stack=[];
var convId=null, ws=null, seen=new Set(), draftT=0, typingHideT=null;

/* =========================================================
 *  初期化
 * ========================================================= */
async function boot_(){
  try{
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()){ liff.login(); return; }
    idToken = liff.getIDToken() || "";
    profile = await liff.getProfile();
    if (!idToken){ showErr_("IDトークンが取得できませんでした。LIFFのスコープに openid を追加してください。"); return; }
    await loadTree_();
    loadProfile_();
    document.getElementById("loading").style.display="none";
    showHome_();
    renderOptions_();
    openMonitor_();
  }catch(e){ showErr_("初期化エラー: "+(e&&e.message?e.message:e)); }
}

var savedProfile={name:"",store:"",email:""};
function loadProfile_(){
  return httpPost_("/v2/profile", {}).then(function(r){ if (r && r.ok){ savedProfile={ name:r.name||"", store:r.store||"", email:r.email||"" }; } }).catch(function(){});
}
async function loadTree_(){
  try{
    // D1から高速取得。失敗時はGAS(スプレッドシート)にフォールバック
    var r = await fetch(WORKER_BASE+"/v2/tree").then(function(x){ return x.json(); }).catch(function(){ return null; });
    if (!r || !r.success || !r.data || !(r.data.level0||[]).length){
      r = await fetch(GAS_URL).then(function(x){ return x.json(); }).catch(function(){ return null; });
    }
    if (r && r.success){ tree = r.data || {}; mediaData = r.media || {}; }
  }catch(e){ tree = tree || {}; }
}

/* =========================================================
 *  画面切替
 * ========================================================= */
function showHome_(){ hideAll_(); document.getElementById("home").style.display="flex"; sendNav_(); }
function showChat_(){ hideAll_(); document.getElementById("chat").style.display="flex"; }
function hideAll_(){
  ["home","chat","formView"].forEach(function(id){ document.getElementById(id).style.display="none"; });
}

/* =========================================================
 *  FAQツリー
 * ========================================================= */
function currentChildren_(){
  if (!tree) return [];
  if (!stack.length) return (tree.level0||[]).map(function(id){ return tree[id]; }).filter(Boolean);
  var node = tree[stack[stack.length-1]];
  if (node && node.children) return node.children.map(function(id){ return tree[id]; }).filter(Boolean);
  return [];
}
function label_(node){ return String(node.value||"").replace(/【[^】]+】/g,"").trim(); }

function renderOptions_(){
  renderCrumb_();
  document.getElementById("homeBack").style.visibility = stack.length ? "visible" : "hidden";
  var box=document.getElementById("options");
  var kids=currentChildren_();
  box.innerHTML="";
  // 回答（末端ノードを開いた場合）はrenderAnswer_で別途表示
  kids.forEach(function(node){
    var b=document.createElement("button");
    b.className="opt";
    b.innerHTML='<span>'+esc_(label_(node))+'</span><span class="arw">›</span>';
    b.onclick=function(){ selectNode_(node.id); };
    box.appendChild(b);
  });
  sendNav_();
  box.scrollTop=0;
}
function renderCrumb_(){
  var c=document.getElementById("crumb");
  var html='<span class="c" onclick="goRoot_()">🏠 トップ</span>';
  stack.forEach(function(id,i){
    var n=tree[id]; if (!n) return;
    html+=' › <span class="c" onclick="goTo_('+i+')">'+esc_(label_(n))+'</span>';
  });
  c.innerHTML=html;
}
function selectNode_(id){
  var node=tree[id]; if (!node) return;
  var hasKids = node.children && node.children.length>0;
  if (hasKids){ stack.push(id); renderOptions_(); return; }
  terminal_(node);
}
function terminal_(node){
  var v=String(node.value||"");
  // 緊急 → 必要事項フォーム → ライブチャット
  if (v.indexOf("緊急対応")!==-1 && v.indexOf("スタッフが直対応")!==-1){ renderEmergencyForm_(); return; }
  // 回答表示
  renderAnswer_(node);
}
function renderAnswer_(node){
  var box=document.getElementById("options");
  box.innerHTML="";
  var div=document.createElement("div");
  div.className="answer";
  var text=label_(node);
  div.textContent = text || "";
  // メディア
  if (node.media && node.media.length){
    node.media.forEach(function(mid){
      var m=mediaData[mid]; if (!m) return;
      if (m.type==="image"){
        var img=document.createElement("img"); img.src=String(m.url||""); img.alt=String(m.text||""); div.appendChild(img);
      } else if (m.type==="form"){
        var fb=document.createElement("a"); fb.className="media"; fb.textContent="📝 "+(m.text||"フォームを開く");
        fb.href="#"; fb.onclick=function(e){ e.preventDefault(); openForm_(String(m.url||""), String(m.text||"")); };
        div.appendChild(document.createElement("br")); div.appendChild(fb);
      } else {
        var a=document.createElement("a"); a.className="media"; a.href=String(m.url||""); a.target="_blank"; a.rel="noopener";
        a.textContent="🔗 "+(m.text||"リンクを開く"); div.appendChild(document.createElement("br")); div.appendChild(a);
      }
    });
  }
  box.appendChild(div);
  // 操作ボタン（自己解決を促す：戻るのみ。緊急対応はツリーの専用項目から）
  var back=document.createElement("button"); back.className="askBtn secondary"; back.style.marginTop="12px";
  back.textContent="← 一覧へ戻る"; back.onclick=function(){ renderOptions_(); };
  box.appendChild(back);
  sendNav_();
  box.scrollTop=0;
}

/* =========================================================
 *  緊急チャット：必要事項フォーム → ライブチャット
 * ========================================================= */
function isOffHours_(){ var h=new Date().getHours(); return (h>=23 || h<8); }
function v_(id){ var el=document.getElementById(id); return el?el.value:""; }

function renderEmergencyForm_(){
  if (convId){ showChat_(); return; }                 // 既に相談中なら戻る
  var box=document.getElementById("options"); box.innerHTML="";
  if (isOffHours_()){
    var d=document.createElement("div"); d.className="answer";
    d.textContent="ただいま受付時間外（23:00〜翌8:00）です。大変恐れ入りますが、翌朝8:00以降に再度お問い合わせいただくか、FAQをご確認ください🙇‍♀️";
    box.appendChild(d);
    var b=document.createElement("button"); b.className="askBtn secondary"; b.style.marginTop="12px"; b.textContent="← 一覧へ戻る"; b.onclick=function(){ renderOptions_(); };
    box.appendChild(b);
    return;
  }
  box.innerHTML =
    '<div class="answer">'
    + '<div style="font-weight:700;margin-bottom:4px;">スタッフにおつなぎします</div>'
    + '<div style="font-size:13px;color:#64748b;margin-bottom:8px;">スムーズなご案内のため、以下をご入力ください。</div>'
    + '<label class="fl">予約者名（ご予約時のお名前）*</label><input id="ef_name" class="fi" type="text" placeholder="例：山田 花子">'
    + '<label class="fl">メールアドレス *</label><input id="ef_email" class="fi" type="email">'
    + '<label class="fl">ご予約店舗名 *</label><input id="ef_store" class="fi" type="text" autocomplete="off" placeholder="例：沼津（「ぬ」でも検索できます）"><div id="ef_store_sug" class="sug"></div>'
    + '<label class="fl">状況 *</label><textarea id="ef_sit" class="fi" placeholder="状況を詳しく教えてください"></textarea>'
    + '<label class="fl">画像・動画の添付（任意・複数可・各20MBまで）</label><input id="ef_file" class="fi" type="file" accept="image/*,video/*" multiple>'
    + '<button id="ef_submit" class="askBtn" style="margin-top:14px;" onclick="submitEmergency_()">確認する</button>'
    + '<button class="askBtn secondary" style="margin-top:10px;" onclick="renderOptions_()">← 戻る</button>'
    + '</div>';
  // 前回入力した情報を自動入力
  if (savedProfile.name)  document.getElementById("ef_name").value=savedProfile.name;
  if (savedProfile.email) document.getElementById("ef_email").value=savedProfile.email;
  if (savedProfile.store) document.getElementById("ef_store").value=savedProfile.store;
  var si=document.getElementById("ef_store");
  if (si) si.addEventListener("input", renderStoreSug_);
  box.scrollTop=0;
}

// 店舗名サジェスト（漢字でも読み仮名でも検索）
function renderStoreSug_(){
  var el=document.getElementById("ef_store"); if (!el) return;
  var q=el.value.trim().toLowerCase();
  var sug=document.getElementById("ef_store_sug"); if (!sug) return;
  if (!q){ sug.innerHTML=""; return; }
  var hits=STORES.filter(function(s){ return s.n.toLowerCase().indexOf(q)!==-1 || s.k.indexOf(q)!==-1; }).slice(0,8);
  if (!hits.length){ sug.innerHTML=""; return; }
  sug.innerHTML=hits.map(function(s){ return '<div class="sug-item" data-n="'+esc_(s.n)+'">'+esc_(s.n)+'</div>'; }).join("");
  Array.prototype.forEach.call(sug.querySelectorAll(".sug-item"), function(it){
    it.addEventListener("click", function(){ el.value=it.getAttribute("data-n"); sug.innerHTML=""; });
  });
}

// ファイルをR2へ直接ストリームアップロード（base64不要・高速）
function uploadFile_(f){
  return fetch(WORKER_BASE+"/v2/upload?name="+encodeURIComponent(f.name), {
    method:"POST",
    headers:{ "content-type": f.type||"application/octet-stream", "authorization":"Bearer "+idToken },
    body: f
  }).then(function(x){ return x.json(); }).catch(function(){ return null; });
}
async function submitEmergency_(){
  var name=v_("ef_name").trim(), email=v_("ef_email").trim(), store=v_("ef_store").trim();
  var situation=v_("ef_sit").trim();
  if (!name || !email || !store || !situation){ alert("予約者名・メール・店舗・状況は必須です。"); return; }
  var btn=document.getElementById("ef_submit"); if (btn){ btn.disabled=true; btn.textContent="送信中…"; }

  // 添付（画像・動画／複数可）をR2へアップロード
  var attachments=[];
  var fi=document.getElementById("ef_file");
  if (fi && fi.files && fi.files.length){
    for (var i=0;i<fi.files.length;i++){
      if (fi.files[i].size > 20*1024*1024){
        alert("「"+fi.files[i].name+"」は20MBを超えています。20MB以下のファイルでお願いします。");
        if (btn){ btn.disabled=false; btn.textContent="確認する"; } return;
      }
    }
    if (btn) btn.textContent="アップロード中…";
    for (var j=0;j<fi.files.length;j++){
      var up=await uploadFile_(fi.files[j]);
      if (up && up.success){ attachments.push({ url:up.fileUrl, type:up.type, name:up.name }); }
    }
  }

  var r=await httpPost_("/v2/conversations", { emergency:true, name:name, email:email, store:store, situation:situation, attachments:attachments });
  if (!r || !r.ok){ if (btn){ btn.disabled=false; btn.textContent="確認する"; } alert("接続に失敗しました。時間をおいて再度お試しください。"); return; }
  convId=r.conversationId;
  showChat_(); setSt_("接続中…"); sendNav_();
  await loadHistory_(); openWs_();
}
function goBack_(){ if (stack.length){ stack.pop(); renderOptions_(); } }
function goRoot_(){ stack=[]; renderOptions_(); }
function goTo_(i){ stack=stack.slice(0,i+1); renderOptions_(); }

/* =========================================================
 *  フォーム
 * ========================================================= */
function openForm_(formType, category){
  document.getElementById("formFrame").src = GAS_URL+"?page=form&type="+encodeURIComponent(formType)+"&category="+encodeURIComponent(category||"")+"&v="+Date.now();
  hideAll_(); document.getElementById("formView").style.display="flex";
}
function closeForm_(){ document.getElementById("formFrame").src="about:blank"; showHome_(); }

/* =========================================================
 *  ライブチャット（必要時に会話を作成）
 * ========================================================= */
function httpPost_(path, body){
  return fetch(WORKER_BASE+path, {
    method:"POST",
    headers:{ "content-type":"application/json", "authorization":"Bearer "+idToken },
    body: JSON.stringify(body||{})
  }).then(function(r){ return r.json(); }).catch(function(){ return null; });
}
async function loadHistory_(){
  try{
    var url=WORKER_BASE+"/v2/messages?role=customer&c="+encodeURIComponent(convId)+"&token="+encodeURIComponent(idToken);
    var r=await fetch(url).then(function(x){ return x.json(); });
    document.getElementById("msgs").innerHTML="";
    if (r && r.ok && Array.isArray(r.messages) && r.messages.length){
      r.messages.forEach(function(m){
        seen.add((m.created_at||"")+"|"+(m.sender_type||"")+"|"+(m.body||""));
        append_(m.sender_type, m.body, m.created_at, m.attachments);
      });
    } else {
      append_("system","お困りごとを入力してください。スタッフが順次対応します。",Date.now());
    }
    scrollBottom_();
  }catch(e){}
}
function openWs_(){
  if (ws){ try{ws.close();}catch(e){} }
  var url=WS_BASE+"/v2/ws?role=customer&c="+encodeURIComponent(convId)+"&token="+encodeURIComponent(idToken);
  ws=new WebSocket(url);
  ws.onopen=function(){
    setSt_("● 接続中");
    var ta=document.getElementById("input"); if (ta){ ta.disabled=false; ta.placeholder="メッセージを入力"; }
    var sb=document.getElementById("sendBtn"); if (sb) sb.disabled=false;
  };
  ws.onclose=function(){ setSt_("再接続待ち"); setTimeout(function(){ if (convId && document.getElementById("chat").style.display!=="none") openWs_(); }, 3000); };
  ws.onmessage=function(ev){
    var d; try{ d=JSON.parse(ev.data); }catch(e){ return; }
    if (d.type==="ended"){ onEnded_(); return; }
    if (d.type==="typing"){ if (d.from==="staff") showTyping_(); return; }
    if (d.type==="message"){
      var key=(d.created_at||"")+"|"+(d.sender_type||"")+"|"+(d.body||"");
      if (seen.has(key)) return;
      seen.add(key);
      if (d.sender_type==="staff") clearTyping_();
      append_(d.sender_type, d.body, d.created_at); scrollBottom_();
    }
  };
}
function setSt_(t){ document.getElementById("connSt").textContent=t; }
// スタッフが会話を終了した時：入力を閉じ、次回は新規（ツリーから）になるよう会話をリセット
function onEnded_(){
  append_("system","スタッフが対応を終了しました。ご利用ありがとうございました。", Date.now());
  scrollBottom_();
  var ta=document.getElementById("input"); if (ta){ ta.disabled=true; ta.value=""; ta.placeholder="対応は終了しました"; }
  var sb=document.getElementById("sendBtn"); if (sb) sb.disabled=true;
  convId=null;
  if (ws){ try{ ws.close(); }catch(e){} ws=null; }
  setSt_("対応終了");
}
function attachHtml_(attachments){
  if (!attachments) return "";
  var arr=attachments;
  if (typeof attachments==="string"){ try{ arr=JSON.parse(attachments); }catch(e){ return ""; } }
  if (!arr || !arr.length) return "";
  return arr.map(function(a){
    var u=esc_(a.url||"");
    if (a.type==="image") return '<a href="'+u+'" target="_blank" rel="noopener"><img src="'+u+'" style="max-width:200px;max-height:260px;border-radius:8px;margin-top:6px;display:block;"></a>';
    if (a.type==="video") return '<video src="'+u+'" controls playsinline style="max-width:220px;max-height:260px;border-radius:8px;margin-top:6px;display:block;"></video>';
    return '<a href="'+u+'" target="_blank" rel="noopener" style="display:inline-block;margin-top:6px;text-decoration:underline;">📎 '+esc_(a.name||"ファイル")+'</a>';
  }).join("");
}
function append_(senderType, body, createdAt, attachments){
  var side=senderType==="customer"?"customer":(senderType==="system"?"system":"staff");
  var who=senderType==="customer"?"":(senderType==="system"?"":"スタッフ");
  var media=attachHtml_(attachments);
  var row=document.createElement("div"); row.className="row "+side;
  row.innerHTML='<div class="bubble">'+linkify_(body||"")+media+'</div>'
    + (who||createdAt ? '<div class="meta">'+(who||"")+(who&&createdAt?" ・ ":"")+(createdAt?fmt_(createdAt):"")+'</div>' : '');
  document.getElementById("msgs").appendChild(row);
}
function scrollBottom_(){ var el=document.getElementById("msgs"); el.scrollTop=el.scrollHeight; }
function showTyping_(){ document.getElementById("typing").textContent="スタッフが入力中…"; if (typingHideT) clearTimeout(typingHideT); typingHideT=setTimeout(clearTyping_,4000); }
function clearTyping_(){ document.getElementById("typing").textContent=""; }

function send_(){
  var ta=document.getElementById("input"); var text=ta.value.trim();
  if (!text) return;
  if (!ws || ws.readyState!==1){ if (convId) openWs_(); return; }
  ws.send(JSON.stringify({ type:"message", body:text }));
  ws.send(JSON.stringify({ type:"draft", body:"" }));
  ta.value=""; ta.style.height="52px";
}
function sendDraft_(){
  if (!ws || ws.readyState!==1) return;
  var now=Date.now(); if (now-draftT<400) return; draftT=now;
  ws.send(JSON.stringify({ type:"draft", body:document.getElementById("input").value }));
}
document.addEventListener("DOMContentLoaded", function(){
  var ta=document.getElementById("input"); if (!ta) return;
  var lastCompEnd=0;
  ta.addEventListener("compositionstart", function(){ lastCompEnd=0; });
  ta.addEventListener("compositionend", function(){ lastCompEnd=Date.now(); sendDraft_(); });
  ta.addEventListener("keydown", function(e){
    if (e.key!=="Enter" || e.shiftKey) return;
    if (e.isComposing || e.keyCode===229) return;
    if (Date.now()-lastCompEnd<120) return;
    e.preventDefault(); send_();
  });
  ta.addEventListener("input", function(){
    ta.style.height="52px"; ta.style.height=Math.min(ta.scrollHeight, Math.round(window.innerHeight*0.4))+"px"; sendDraft_();
  });
});

/* =========================================================
 *  ユーティリティ
 * ========================================================= */
function showErr_(msg){ document.getElementById("loading").style.display="none"; var el=document.getElementById("errBox"); el.style.display="block"; el.textContent="⚠️ "+msg; }
function esc_(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function linkify_(s){ return esc_(s).replace(/(https?:\/\/[^\s<]+)/g, function(u){ return '<a href="'+u+'" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;word-break:break-all;">'+u+'</a>'; }); }
function fmt_(ms){ var d=new Date(Number(ms)); if (isNaN(d)) return ""; return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }

/* =========================================================
 *  訪問者モニター（スタッフがお客様の動きを見るための通知）
 * ========================================================= */
var monWs=null;
function openMonitor_(){
  if (!idToken) return;
  try{ monWs=new WebSocket(WS_BASE+"/v2/monitor?role=visitor&token="+encodeURIComponent(idToken)); }catch(e){ return; }
  monWs.onopen=function(){ sendNav_(); };
  monWs.onclose=function(){ setTimeout(openMonitor_, 5000); };
}
function monSend_(o){ if (monWs && monWs.readyState===1){ try{ monWs.send(JSON.stringify(o)); }catch(e){} } }
function sendNav_(){
  var inChat = document.getElementById("chat").style.display!=="none";
  if (inChat){ monSend_({ type:"nav", path:["緊急チャット"], chat:true }); return; }
  var labels=stack.map(function(id){ return tree[id]?label_(tree[id]):""; }).filter(Boolean);
  monSend_({ type:"nav", path:labels, chat:false });
}
document.addEventListener("visibilitychange", function(){ monSend_({ type:"presence", status: document.hidden?"hidden":"viewing" }); });

boot_();
</script>
